<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>TYPEBLAST</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#e2b714;--red:#ca4754;--green:#4caf7d;
  --cyan:#00e5ff;--purple:#7b2fff;--pink:#ff2d78;
  --bg:#0e1012;--bg2:#14171c;--bg3:#1a1e24;--bg4:#22272e;
  --text:#d1d5db;--dim:#4b5563;--mid:#6b7280;
  --border:rgba(255,255,255,0.07);
}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'Inter',sans-serif;display:flex;flex-direction:column;height:100dvh;width:100vw;}

/* ═══ NAV ═══════════════════════════════════ */
#navbar{
  height:50px;flex-shrink:0;background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:2px;z-index:200;
}
.logo{
  font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-right:8px;flex-shrink:0;
}
.nav-tab{
  display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:7px;
  border:none;background:transparent;color:var(--dim);
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.nav-tab svg{width:13px;height:13px;flex-shrink:0;}
.nav-tab.active{color:var(--text);background:rgba(255,255,255,0.08);}
.nav-tab.active.t{color:var(--gold);}
.nav-tab.active.b{color:var(--cyan);}
.nav-tab:not(.active):hover{color:var(--mid);}
.nav-r{margin-left:auto;display:flex;gap:4px;}
.nav-icon{
  width:34px;height:34px;border-radius:7px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--dim);transition:all .18s;
}
.nav-icon svg{width:16px;height:16px;}
.nav-icon:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-icon.active-icon{color:var(--cyan);}

/* ═══ SCREENS ════════════════════════════════ */
.screen{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;}
.screen.active{display:flex;}

/* ═══════════════════════════════════════════
   TRAINING SCREEN
═══════════════════════════════════════════ */
#train-screen{background:var(--bg);flex-direction:column;}

/* top bar */
#t-topbar{
  flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:10px 16px 4px;
}
#t-timer{
  font-family:'Roboto Mono',monospace;font-size:30px;font-weight:700;
  color:var(--gold);min-width:44px;line-height:1;
}
#t-livebar{display:flex;gap:16px;}
.tls{text-align:right;}
.tls-lbl{font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.tls-val{font-family:'Roboto Mono',monospace;font-size:15px;font-weight:600;color:var(--mid);}

/* time options */
#t-opts{flex-shrink:0;display:flex;gap:1px;padding:2px 16px 6px;align-items:center;}
.topt{
  font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;
  padding:3px 11px;border-radius:5px;border:none;
  background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;
}
.topt.on{color:var(--gold);background:rgba(226,183,20,0.1);}

/* word display */
#t-words-area{
  flex:1;min-height:0;display:flex;flex-direction:column;
  justify-content:center;padding:0 16px;position:relative;overflow:hidden;
}
#t-words-clip{
  position:relative;overflow:hidden;
  height:calc(var(--lh) * 3);
  font-family:'Roboto Mono',monospace;
  font-size:clamp(17px,3.8vw,22px);
  line-height:var(--lh);
  --lh:2em;
  letter-spacing:.3px;
  color:var(--dim);
}
#t-words-inner{
  position:absolute;top:0;left:0;right:0;
  transition:transform .15s ease;
  will-change:transform;
}
.tw{display:inline;}
.tc{position:relative;display:inline;}
.tc.ok{color:var(--text);}
.tc.bad{color:var(--red);}
.tc.bad-sp{background:rgba(202,71,84,.2);border-radius:2px;}
.tc.cur::after{
  content:'';position:absolute;left:0;top:15%;bottom:15%;
  width:2px;background:var(--gold);border-radius:1px;
  animation:cblink .65s ease infinite;
}
@keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}

/* snippet import btn inside word area */
#t-import-btn{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:30px;height:56px;
  background:rgba(0,229,255,0.05);
  border:1px solid rgba(0,229,255,0.15);
  border-left:none;border-radius:0 8px 8px 0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;z-index:10;
}
#t-import-btn:hover,#t-import-btn:active{background:rgba(0,229,255,0.12);border-color:rgba(0,229,255,0.35);}
#t-import-btn svg{width:14px;height:14px;color:var(--cyan);}

/* result panel */
#t-result{
  display:none;position:absolute;inset:0;background:var(--bg);
  z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
#t-result.show{display:flex;}
.r-lbl{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
.r-wpm{font-family:'Roboto Mono',monospace;font-size:72px;font-weight:700;color:var(--gold);line-height:1;}
.r-row{display:flex;gap:24px;margin-top:4px;}
.r-s{text-align:center;}
.r-sv{font-family:'Roboto Mono',monospace;font-size:24px;font-weight:600;color:var(--text);}
.r-sl{font-size:9px;letter-spacing:2px;color:var(--dim);margin-top:2px;}
.r-btn{
  margin-top:14px;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;
  padding:9px 24px;background:transparent;border:1px solid rgba(255,255,255,0.1);
  color:var(--mid);cursor:pointer;border-radius:5px;transition:all .2s;text-transform:uppercase;
}
.r-btn:active{border-color:var(--gold);color:var(--gold);}

/* ── TRAINING KEYBOARD ───────────────────────── */
#t-keyboard{
  flex-shrink:0;
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:6px 4px 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
}
.kb-row{display:flex;justify-content:center;gap:5px;margin-bottom:5px;}
.kb-row:last-child{margin-bottom:0;}

.kk{
  height:44px;flex:1;max-width:38px;min-width:28px;
  background:var(--bg4);
  border:none;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:background .08s,transform .08s,box-shadow .08s;
  box-shadow:0 3px 0 #0a0c0f,inset 0 1px 0 rgba(255,255,255,0.06);
  touch-action:manipulation;position:relative;
  -webkit-user-select:none;user-select:none;
}
.kk-letter{
  font-family:'Roboto Mono',monospace;
  font-size:16px;font-weight:700;line-height:1;
  color:var(--text);
}
.kk-hint{
  font-size:6px;color:rgba(226,183,20,0);
  margin-top:1px;transition:color .1s;
}
.kk.next-key .kk-hint{color:var(--gold);}
.kk.next-key{
  background:#1e1a0e;
  box-shadow:0 3px 0 #0a0c0f,0 0 0 1px rgba(226,183,20,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
}
.kk.next-key .kk-letter{color:var(--gold);}

.kk:active,.kk.pressed{
  background:var(--bg3);transform:translateY(2px);
  box-shadow:0 1px 0 #0a0c0f,inset 0 1px 0 rgba(255,255,255,0.03);
}

.kk-sp{
  min-width:48px;max-width:58px;
  background:var(--bg3);
}
.kk-sp .kk-letter{font-size:11px;font-weight:600;color:var(--mid);letter-spacing:.5px;}

.kk-space{
  flex:1;max-width:220px;min-width:120px;
  background:var(--bg3);
}
.kk-space .kk-letter{font-size:11px;color:var(--mid);}

/* ═══════════════════════════════════════════
   BATTLE SCREEN
═══════════════════════════════════════════ */
#battle-screen{position:relative;background:#060911;}

#battle-canvas{position:absolute;inset:0;width:100%;height:100%;}

#b-hud{
  position:absolute;top:0;left:0;right:0;z-index:20;pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(6,9,17,.96) 55%,transparent);
}
.bhs{text-align:center;}
.bhs-l{font-size:7px;letter-spacing:3px;color:rgba(0,229,255,.25);text-transform:uppercase;}
.bhs-v{font-family:'Roboto Mono',monospace;font-size:17px;font-weight:700;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,.5);}
.blives{display:flex;gap:4px;margin-top:3px;justify-content:center;}
.blife{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 5px var(--cyan);transition:.3s;}
.blife.dead{background:#1a2233;box-shadow:none;}

/* level badge */
#b-lvl-badge{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:30;pointer-events:none;
  font-family:'Orbitron',monospace;
  font-size:48px;font-weight:900;
  color:var(--cyan);text-shadow:0 0 30px var(--cyan);
  opacity:0;transition:opacity .3s;
}

#b-typed{
  position:absolute;bottom:calc(var(--bkb-h) + 6px);left:0;right:0;
  text-align:center;z-index:20;pointer-events:none;
  font-family:'Roboto Mono',monospace;font-size:15px;letter-spacing:4px;
  color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,.6);min-height:22px;
}

/* battle overlay */
#b-overlay{
  position:absolute;inset:0;z-index:200;background:rgba(6,9,17,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.bov-t{
  font-family:'Orbitron',monospace;font-size:clamp(24px,8vw,46px);font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(0,229,255,.3));
}
.bov-sub{color:rgba(0,229,255,.3);letter-spacing:2px;font-size:10px;}
.bov-score{font-family:'Roboto Mono',monospace;font-size:28px;color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
.bov-btn{
  font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;padding:11px 28px;
  background:transparent;border:1px solid var(--cyan);color:var(--cyan);
  cursor:pointer;border-radius:5px;transition:all .22s;text-transform:uppercase;
}
.bov-btn:active{background:rgba(0,229,255,.08);}

/* ── BATTLE KEYBOARD ─────────────────────────── */
#b-keyboard{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  --bkb-h:210px;
  height:var(--bkb-h);
  background:rgba(8,11,18,.97);
  border-top:1px solid rgba(0,229,255,.1);
  padding:5px 4px 6px;
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:4px;
}
.bkb-row{display:flex;justify-content:center;gap:4px;}
.bk{
  height:40px;flex:1;max-width:36px;min-width:26px;
  background:linear-gradient(160deg,#0d1520,#080d15);
  border:1px solid rgba(0,229,255,.12);
  border-bottom:2px solid rgba(0,0,0,.4);
  border-radius:7px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .07s;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
}
.bk-l{
  font-family:'Roboto Mono',monospace;
  font-size:16px;font-weight:700;color:var(--cyan);
  text-shadow:0 0 6px rgba(0,229,255,.35);line-height:1;
}
.bk-d{font-size:6px;color:rgba(0,229,255,.18);margin-top:1px;}
.bk:active,.bk.pressed{
  background:linear-gradient(160deg,#0d2235,#081525);
  border-color:var(--cyan);
  box-shadow:0 0 10px rgba(0,229,255,.2),inset 0 0 6px rgba(0,229,255,.06);
  transform:translateY(1px);
}
.bk.next{
  border-color:rgba(123,47,255,.7);
  background:linear-gradient(160deg,#130a2e,#0a0520);
}
.bk.next .bk-l{color:#bf8aff;text-shadow:0 0 8px rgba(123,47,255,.5);}

.bk-del{
  min-width:46px;max-width:56px;
  border-color:rgba(255,45,120,.2);
}
.bk-del .bk-l{font-size:11px;color:rgba(255,45,120,.6);letter-spacing:.5px;}

/* ═══ MODALS ══════════════════════════════════ */
.modal-wrap{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(8,10,16,.97);
  flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px;
}
.modal-wrap.open{display:flex;}
.modal-title{font-family:'Orbitron',monospace;color:var(--cyan);font-size:13px;letter-spacing:3px;}
.modal-sub{color:rgba(255,255,255,.22);font-size:11px;text-align:center;line-height:1.6;max-width:300px;}
.modal-ta{
  width:100%;max-width:380px;height:140px;
  background:var(--bg3);border:1px solid rgba(0,229,255,.15);border-radius:7px;
  color:var(--text);font-family:'Roboto Mono',monospace;font-size:13px;
  padding:10px;resize:none;outline:none;-webkit-user-select:text;user-select:text;
}
.modal-ta:focus{border-color:rgba(0,229,255,.32);}
.modal-count{font-size:9px;color:var(--dim);letter-spacing:1px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{
  font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;
  padding:9px 20px;border-radius:5px;cursor:pointer;transition:all .2s;
  text-transform:uppercase;border:1px solid;
}
.modal-btn.ok{background:rgba(0,229,255,.08);border-color:var(--cyan);color:var(--cyan);}
.modal-btn.ok:active{background:rgba(0,229,255,.16);}
.modal-btn.no{background:transparent;border-color:rgba(255,255,255,.1);color:var(--dim);}
</style>
</head>
<body>

<!-- NAV -->
<div id="navbar">
  <span class="logo">TB</span>

  <button class="nav-tab t active" id="tab-t" onclick="goMode('train')">
    <!-- keyboard icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M6 13h.01M10 13h4M18 13h.01M6 17h12"/>
    </svg>
    Training
  </button>

  <button class="nav-tab b" id="tab-b" onclick="goMode('battle')">
    <!-- rocket icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
      <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
      <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
    </svg>
    Battle
  </button>

  <div class="nav-r">
    <!-- words icon -->
    <button class="nav-icon" title="تخصيص الكلمات" onclick="openModal('words-modal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
  </div>
</div>

<!-- ══ TRAINING SCREEN ══════════════════════════ -->
<div id="train-screen" class="screen active">

  <div id="t-topbar">
    <div id="t-timer">30</div>
    <div id="t-livebar">
      <div class="tls"><div class="tls-lbl">WPM</div><div class="tls-val" id="tl-wpm">–</div></div>
      <div class="tls"><div class="tls-lbl">RAW</div><div class="tls-val" id="tl-raw">–</div></div>
      <div class="tls"><div class="tls-lbl">ACC</div><div class="tls-val" id="tl-acc">–</div></div>
    </div>
  </div>

  <div id="t-opts">
    <button class="topt" onclick="setTTime(15)">15</button>
    <button class="topt on" onclick="setTTime(30)">30</button>
    <button class="topt" onclick="setTTime(60)">60</button>
    <button class="topt" onclick="setTTime(120)">120</button>
  </div>

  <div id="t-words-area">
    <!-- snippet import button on left -->
    <button id="t-import-btn" onclick="openModal('snippet-modal')" title="استيراد نص">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </button>

    <div id="t-words-clip">
      <div id="t-words-inner"></div>
    </div>

    <div id="t-result">
      <div class="r-lbl">words per minute</div>
      <div class="r-wpm" id="r-wpm">0</div>
      <div class="r-row">
        <div class="r-s"><div class="r-sv" id="r-acc">0%</div><div class="r-sl">accuracy</div></div>
        <div class="r-s"><div class="r-sv" id="r-raw">0</div><div class="r-sl">raw</div></div>
        <div class="r-s"><div class="r-sv" id="r-chars">0/0</div><div class="r-sl">chars</div></div>
      </div>
      <button class="r-btn" onclick="tRestart()">↺ &nbsp;restart</button>
    </div>
  </div>

  <!-- TRAINING KEYBOARD -->
  <div id="t-keyboard">
    <div class="kb-row" id="tkr1"></div>
    <div class="kb-row" id="tkr2"></div>
    <div class="kb-row" id="tkr3"></div>
    <div class="kb-row" id="tkr4"></div>
  </div>
</div>

<!-- ══ BATTLE SCREEN ══════════════════════════ -->
<div id="battle-screen" class="screen">
  <canvas id="battle-canvas"></canvas>

  <div id="b-hud">
    <div class="bhs"><div class="bhs-l">SCORE</div><div class="bhs-v" id="bh-score">0</div></div>
    <div class="bhs"><div class="bhs-l">LIVES</div><div class="blives" id="bh-lives"></div></div>
    <div class="bhs"><div class="bhs-l">LVL</div><div class="bhs-v" id="bh-level">1</div></div>
    <div class="bhs"><div class="bhs-l">ACC</div><div class="bhs-v" id="bh-acc">–</div></div>
  </div>

  <div id="b-lvl-badge"></div>
  <div id="b-typed"></div>

  <div id="b-overlay">
    <div class="bov-t" id="bov-title">BATTLE</div>
    <div class="bov-sub" id="bov-sub">اكتب الكلمات قبل أن تصل للأسفل</div>
    <div id="bov-score-box" style="display:none"><div class="bov-score" id="bov-score"></div></div>
    <button class="bov-btn" id="bov-btn" onclick="bStart()">ابدأ اللعبة</button>
  </div>

  <!-- BATTLE KEYBOARD -->
  <div id="b-keyboard">
    <div class="bkb-row" id="bkr1"></div>
    <div class="bkb-row" id="bkr2"></div>
    <div class="bkb-row" id="bkr3"></div>
  </div>
</div>

<!-- WORDS MODAL -->
<div id="words-modal" class="modal-wrap">
  <div class="modal-title">✏ WORD LIST</div>
  <div class="modal-sub">أضف كلماتك — سطر لكل كلمة<br>تنطبق على Training و Battle</div>
  <textarea id="words-ta" class="modal-ta" placeholder="marketing&#10;email&#10;brand&#10;target&#10;..."></textarea>
  <div class="modal-count" id="words-count">0 كلمة</div>
  <div class="modal-btns">
    <button class="modal-btn ok" onclick="saveWords()">حفظ ✓</button>
    <button class="modal-btn no" onclick="closeModal('words-modal')">إلغاء</button>
  </div>
</div>

<!-- SNIPPET MODAL -->
<div id="snippet-modal" class="modal-wrap">
  <div class="modal-title">📎 استيراد نص</div>
  <div class="modal-sub">الصق نصاً كاملاً وستظهر كلماته كتمرين</div>
  <textarea id="snippet-ta" class="modal-ta" placeholder="Paste any English text here..."></textarea>
  <div class="modal-btns">
    <button class="modal-btn ok" onclick="loadSnippet()">استيراد ✓</button>
    <button class="modal-btn no" onclick="closeModal('snippet-modal')">إلغاء</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════
// SHARED STATE
// ══════════════════════════════════════════════
let WORDS = [
  'the','be','to','of','and','in','that','have','it','for','not','on','with',
  'as','you','do','at','this','but','by','from','they','we','say','she','or',
  'an','will','my','one','all','would','there','their','what','so','up','out',
  'if','about','who','get','which','go','me','when','make','can','like','time',
  'no','just','know','take','people','into','year','your','good','some','could',
  'them','see','other','than','then','now','look','only','come','over','think',
  'back','after','use','how','our','work','first','well','way','even','new',
  'want','any','these','give','day','most','us','type','write','read','fast',
  'slow','word','key','start','stop','brand','email','target','reach','click',
  'post','share','lead','sale','grow','boost','data','user','plan','goal','test',
  'market','create','build','launch','track','convert','engage','content','reach'
];
const rnd = () => WORDS[Math.floor(Math.random()*WORDS.length)];
let mode = 'train';

// ══════════════════════════════════════════════
// KEYBOARD ROWS
// ══════════════════════════════════════════════
const ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M','⌫'],
  ['SPACE']
];
const BROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M','DEL']
];

// ══════════════════════════════════════════════
// MODE SWITCHING
// ══════════════════════════════════════════════
function goMode(m) {
  mode = m;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if (m==='train') {
    document.getElementById('tab-t').classList.add('active');
    document.getElementById('train-screen').classList.add('active');
    tRestart();
  } else {
    document.getElementById('tab-b').classList.add('active');
    document.getElementById('battle-screen').classList.add('active');
    bResize();
  }
}

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function openModal(id) {
  if (id==='words-modal') {
    document.getElementById('words-ta').value = WORDS.join('\n');
    updateWordsCount();
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function updateWordsCount() {
  const n = document.getElementById('words-ta').value.split(/[\n\s,]+/).filter(w=>w.trim()).length;
  document.getElementById('words-count').textContent = n + ' كلمة';
}
document.getElementById('words-ta').addEventListener('input', updateWordsCount);

function saveWords() {
  const parsed = document.getElementById('words-ta').value
    .split(/[\n\s,]+/).map(w=>w.trim().toLowerCase()).filter(w=>w.length>0);
  if (parsed.length < 5) { alert('أضف على الأقل 5 كلمات'); return; }
  WORDS = parsed;
  closeModal('words-modal');
  if (mode==='train') tRestart();
}

function loadSnippet() {
  const raw = document.getElementById('snippet-ta').value.trim();
  if (!raw) return;
  const words = raw.toLowerCase()
    .replace(/[^a-z\s]/g,' ')
    .split(/\s+/)
    .filter(w=>w.length>=2 && w.length<=12);
  if (words.length < 5) { alert('النص قصير جداً أو لا يحتوي كلمات إنجليزية كافية'); return; }
  WORDS = [...new Set(words)];
  closeModal('snippet-modal');
  if (mode==='train') tRestart();
}

// ══════════════════════════════════════════════
// BUILD TRAINING KEYBOARD
// ══════════════════════════════════════════════
const tKeyEls = {}; // letter -> element

function buildTKeyboard() {
  ROWS.forEach((row, ri) => {
    const rowEl = document.getElementById(['tkr1','tkr2','tkr3','tkr4'][ri]);
    rowEl.innerHTML = '';
    row.forEach(k => {
      const btn = document.createElement('div');
      if (k === 'SPACE') {
        btn.className = 'kk kk-space';
        btn.innerHTML = `<span class="kk-letter">space</span>`;
        addKbEvents(btn, ' ');
      } else if (k === '⌫') {
        btn.className = 'kk kk-sp';
        btn.innerHTML = `<span class="kk-letter">⌫</span>`;
        addKbEvents(btn, 'Backspace');
      } else {
        btn.className = 'kk';
        btn.innerHTML = `<span class="kk-letter">${k}</span><span class="kk-hint">▸</span>`;
        tKeyEls[k] = btn;
        addKbEvents(btn, k);
      }
      rowEl.appendChild(btn);
    });
  });
}

function addKbEvents(btn, key) {
  let pressTimer = null;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    btn.classList.add('pressed');
    tHandleKey(key);
    // backspace repeat on hold
    if (key === 'Backspace') {
      pressTimer = setTimeout(() => {
        pressTimer = setInterval(() => tHandleKey('Backspace'), 80);
      }, 400);
    }
  }, {passive:false});
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    btn.classList.remove('pressed');
    if (pressTimer) { clearTimeout(pressTimer); clearInterval(pressTimer); pressTimer=null; }
  }, {passive:false});
  btn.addEventListener('touchcancel', () => {
    btn.classList.remove('pressed');
    if (pressTimer) { clearTimeout(pressTimer); clearInterval(pressTimer); pressTimer=null; }
  });
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    btn.classList.add('pressed');
    tHandleKey(key);
  });
  btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
}

function tHighlightNextKey() {
  Object.values(tKeyEls).forEach(el => el.classList.remove('next-key'));
  if (!tStarted || !tRunning) return;
  const cur = tChars[tIdx];
  if (!cur) return;
  const ch = cur.textContent.toUpperCase();
  if (tKeyEls[ch]) tKeyEls[ch].classList.add('next-key');
}

// ══════════════════════════════════════════════
// BUILD BATTLE KEYBOARD
// ══════════════════════════════════════════════
const bKeyEls = {};

function buildBKeyboard() {
  BROWS.forEach((row, ri) => {
    const rowEl = document.getElementById(['bkr1','bkr2','bkr3'][ri]);
    rowEl.innerHTML = '';
    row.forEach(k => {
      const btn = document.createElement('div');
      if (k === 'DEL') {
        btn.className = 'bk bk-del';
        btn.innerHTML = `<span class="bk-l">DEL</span>`;
        bAddEvents(btn, 'Backspace');
      } else {
        btn.className = 'bk';
        btn.innerHTML = `<span class="bk-l">${k}</span><span class="bk-d">+</span>`;
        bKeyEls[k] = btn;
        bAddEvents(btn, k);
      }
      rowEl.appendChild(btn);
    });
  });
}

function bAddEvents(btn, key) {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    btn.classList.add('pressed');
    bHandleKey(key);
  }, {passive:false});
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    setTimeout(()=>btn.classList.remove('pressed'), 80);
  }, {passive:false});
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    bHandleKey(key);
    btn.classList.add('pressed');
    setTimeout(()=>btn.classList.remove('pressed'), 80);
  });
}

function bHighlightNextKey() {
  Object.values(bKeyEls).forEach(el=>el.classList.remove('next'));
  const tw = bWords.find(w=>w.matched>0) || null;
  if (tw && bInput.length < tw.text.length) {
    const nc = tw.text[bInput.length].toUpperCase();
    if (bKeyEls[nc]) bKeyEls[nc].classList.add('next');
  }
}

// Desktop keyboard fallback
document.addEventListener('keydown', e => {
  if (document.querySelector('.modal-wrap.open')) return;
  if (e.key === 'Tab') { e.preventDefault(); if(mode==='train') tRestart(); return; }
  if (e.ctrlKey||e.metaKey||e.altKey) return;
  if (mode==='train') {
    if (e.key === 'Backspace') { e.preventDefault(); tHandleKey('Backspace'); }
    else if (e.key === ' ') { e.preventDefault(); tHandleKey(' '); }
    else if (e.key.length===1) tHandleKey(e.key);
  } else if (mode==='battle') {
    if (e.key === 'Backspace') { e.preventDefault(); bHandleKey('Backspace'); }
    else if (e.key.length===1 && /[a-zA-Z]/.test(e.key)) bHandleKey(e.key);
  }
});

// ══════════════════════════════════════════════
// TRAINING MODE
// ══════════════════════════════════════════════
let tTime=30, tLeft=30, tRunning=false, tStarted=false, tInterval=null;
let tChars=[], tIdx=0, tTotal=0, tCorrect=0, tWrong=0;
let tLineH = 0;
const TWCOUNT = 250;

function tBuild() {
  const inner = document.getElementById('t-words-inner');
  inner.innerHTML = ''; tChars = []; tIdx = 0;
  for (let w=0; w<TWCOUNT; w++) {
    const word = rnd();
    const ws = document.createElement('span');
    ws.className = 'tw';
    for (const ch of word) {
      const cs = document.createElement('span');
      cs.className='tc'; cs.textContent=ch;
      ws.appendChild(cs); tChars.push(cs);
    }
    if (w < TWCOUNT-1) {
      const sp = document.createElement('span');
      sp.className='tc'; sp.textContent=' '; ws.appendChild(sp); tChars.push(sp);
    }
    inner.appendChild(ws);
  }
  if (tChars.length) tChars[0].classList.add('cur');
  // compute line height
  requestAnimationFrame(() => {
    const clip = document.getElementById('t-words-clip');
    const fs = parseFloat(getComputedStyle(clip).fontSize);
    tLineH = fs * 2; // line-height: 2em
    clip.style.setProperty('--lh', tLineH + 'px');
    clip.style.height = (tLineH * 3) + 'px';
  });
}

function tScroll() {
  const cur = tChars[tIdx];
  if (!cur || !tLineH) return;
  const clip = document.getElementById('t-words-clip');
  const inner = document.getElementById('t-words-inner');
  const clipRect = clip.getBoundingClientRect();
  const curRect = cur.getBoundingClientRect();
  const relTop = curRect.top - clipRect.top;
  if (relTop > tLineH * 1.5) {
    const curY = inner.style.transform ? parseFloat(inner.style.transform.replace('translateY(','')) : 0;
    inner.style.transform = `translateY(${curY - tLineH}px)`;
  }
}

function tHandleKey(key) {
  if (document.getElementById('t-result').classList.contains('show')) {
    if (key === 'Enter') tRestart();
    return;
  }
  if (!tRunning && !tStarted && key !== 'Backspace' && key.length === 1) tStartTimer();
  if (!tRunning) return;

  const cur = tChars[tIdx];
  if (!cur) return;

  if (key === 'Backspace') {
    if (tIdx === 0) return;
    cur.classList.remove('cur');
    tIdx--;
    const prev = tChars[tIdx];
    prev.classList.remove('ok','bad','bad-sp');
    prev.classList.add('cur');
    tHighlightNextKey();
    return;
  }

  if (key.length !== 1) return;
  const expected = cur.textContent;
  cur.classList.remove('cur');
  tTotal++;

  if (key === expected) { cur.classList.add('ok'); tCorrect++; }
  else { cur.classList.add(expected===' '?'bad-sp':'bad'); tWrong++; }

  tIdx++;
  if (tIdx < tChars.length) tChars[tIdx].classList.add('cur');
  tScroll();
  tHighlightNextKey();
  tLiveUpdate();
}

function tStartTimer() {
  tStarted=true; tRunning=true; tLeft=tTime;
  document.getElementById('t-timer').textContent=tLeft;
  tInterval = setInterval(() => {
    tLeft--;
    document.getElementById('t-timer').textContent=tLeft;
    tLiveUpdate();
    if (tLeft<=0) { clearInterval(tInterval); tEnd(); }
  },1000);
}

function tLiveUpdate() {
  const el = Math.max(1,tTime-tLeft);
  const wpm = Math.round((tCorrect/5)/(el/60));
  const raw = Math.round((tTotal/5)/(el/60));
  const acc = tTotal===0?100:Math.round(tCorrect/tTotal*100);
  document.getElementById('tl-wpm').textContent=wpm||0;
  document.getElementById('tl-raw').textContent=raw||0;
  document.getElementById('tl-acc').textContent=acc+'%';
}

function tEnd() {
  tRunning=false;
  const wpm=Math.round((tCorrect/5)/(tTime/60));
  const raw=Math.round((tTotal/5)/(tTime/60));
  const acc=tTotal===0?100:Math.round(tCorrect/tTotal*100);
  document.getElementById('r-wpm').textContent=wpm||0;
  document.getElementById('r-acc').textContent=acc+'%';
  document.getElementById('r-raw').textContent=raw||0;
  document.getElementById('r-chars').textContent=tCorrect+'/'+tTotal;
  document.getElementById('t-result').classList.add('show');
}

function tRestart() {
  clearInterval(tInterval);
  tRunning=false;tStarted=false;tTotal=0;tCorrect=0;tWrong=0;tIdx=0;tLeft=tTime;
  document.getElementById('t-timer').textContent=tTime;
  document.getElementById('tl-wpm').textContent='–';
  document.getElementById('tl-raw').textContent='–';
  document.getElementById('tl-acc').textContent='–';
  document.getElementById('t-result').classList.remove('show');
  document.getElementById('t-words-inner').style.transform='';
  tBuild();
  tHighlightNextKey();
}

function setTTime(t) {
  tTime=t;
  document.querySelectorAll('.topt').forEach(b=>b.classList.toggle('on',parseInt(b.textContent)===t));
  tRestart();
}

// ══════════════════════════════════════════════
// BATTLE MODE
// ══════════════════════════════════════════════
const bCanvas=document.getElementById('battle-canvas');
const bCtx=bCanvas.getContext('2d');

function bResize(){
  const s=document.getElementById('battle-screen');
  bCanvas.width=s.clientWidth;
  const kb=document.getElementById('b-keyboard');
  bCanvas.height=s.clientHeight-kb.offsetHeight;
}
window.addEventListener('resize',()=>{if(mode==='battle')bResize();});

// ── Stars ────────────────────────────────────
const STARS=Array.from({length:200},()=>({
  x:Math.random(),y:Math.random(),r:Math.random()*1.5+.1,
  a:Math.random()*.8+.15,spd:Math.random()*.00014+.00003,
  tw:Math.random()*Math.PI*2,color:Math.random()>.85?'200,160,255':'180,225,255'
}));

// shooting stars
let sStars=[];
function maybeShootingStar(){
  if(Math.random()<.004){
    sStars.push({x:Math.random(),y:0,vx:.008+Math.random()*.006,vy:.004+Math.random()*.003,life:1});
  }
}

function drawBG(){
  // Deep space gradient
  const g=bCtx.createLinearGradient(0,0,0,bCanvas.height);
  g.addColorStop(0,'#04060e');
  g.addColorStop(.3,'#060a14');
  g.addColorStop(.7,'#050811');
  g.addColorStop(1,'#040610');
  bCtx.fillStyle=g;bCtx.fillRect(0,0,bCanvas.width,bCanvas.height);

  // Nebula blobs
  const nebulas=[
    {x:.72,y:.12,r:.55,c:'rgba(80,20,180,.08)'},
    {x:.18,y:.65,r:.45,c:'rgba(0,120,200,.06)'},
    {x:.5,y:.4,r:.3,c:'rgba(20,60,140,.04)'},
  ];
  nebulas.forEach(n=>{
    const nb=bCtx.createRadialGradient(
      n.x*bCanvas.width,n.y*bCanvas.height,0,
      n.x*bCanvas.width,n.y*bCanvas.height,n.r*bCanvas.width
    );
    nb.addColorStop(0,n.c);nb.addColorStop(1,'transparent');
    bCtx.fillStyle=nb;bCtx.fillRect(0,0,bCanvas.width,bCanvas.height);
  });

  // Stars
  const t=Date.now()*.001;
  STARS.forEach(s=>{
    s.y+=s.spd;if(s.y>1){s.y=0;s.x=Math.random();}
    const tw=.4+.6*Math.sin(t*1.5+s.tw);
    bCtx.beginPath();bCtx.arc(s.x*bCanvas.width,s.y*bCanvas.height,s.r,0,Math.PI*2);
    bCtx.fillStyle=`rgba(${s.color},${s.a*tw})`;bCtx.fill();
  });

  // Shooting stars
  maybeShootingStar();
  sStars=sStars.filter(s=>s.life>0);
  sStars.forEach(s=>{
    bCtx.save();bCtx.globalAlpha=s.life*.8;
    bCtx.strokeStyle='rgba(200,220,255,0.9)';bCtx.lineWidth=1.5;
    bCtx.beginPath();
    bCtx.moveTo(s.x*bCanvas.width,s.y*bCanvas.height);
    bCtx.lineTo((s.x-s.vx*6)*bCanvas.width,(s.y-s.vy*6)*bCanvas.height);
    bCtx.stroke();bCtx.restore();
    s.x+=s.vx;s.y+=s.vy;s.life-=.025;
  });

  // Fine grid
  bCtx.strokeStyle='rgba(0,229,255,.015)';bCtx.lineWidth=1;
  for(let x=0;x<bCanvas.width;x+=52){bCtx.beginPath();bCtx.moveTo(x,0);bCtx.lineTo(x,bCanvas.height);bCtx.stroke();}
  for(let y=0;y<bCanvas.height;y+=52){bCtx.beginPath();bCtx.moveTo(0,y);bCtx.lineTo(bCanvas.width,y);bCtx.stroke();}
}

// ── Battle State ─────────────────────────────
let bWords=[],bScore=0,bLives=5,bLevel=1,bLevelPrev=1;
let bInput='',bRunning=false,bFrame;
let bSpawnT=0,bSpawnI=150,bTotal=0,bCorrect=0,bKilled=0;
let bSlowMo=0;
let bExpl=[],bPart=[],bBeams=[];
let bShipA=-Math.PI/2,bTarget=null;
let bLvlFlash=0;

const bSpd=()=>(.18+bLevel*.13)*(bCanvas.height/600);
const bSI=()=>Math.max(55,150-bLevel*9);

function bSpawn(){
  const text=rnd(),pad=60;
  bWords.push({
    text,x:pad+Math.random()*(bCanvas.width-pad*2),
    y:-26,speed:bSpd()+Math.random()*.2,
    matched:0,glow:Math.random()*Math.PI*2,opacity:0
  });
}

function bBoom(x,y,color='#00e5ff'){
  for(let i=0;i<24;i++){
    const a=(Math.PI*2/24)*i,s=2+Math.random()*5;
    bExpl.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,size:2+Math.random()*3,color});
  }
}
function bSpark(x,y){
  for(let i=0;i<6;i++)
    bPart.push({x,y,vx:(Math.random()-.5)*3,vy:-Math.random()*3,life:1,size:1+Math.random()*2});
}

function bDrawWord(w){
  bCtx.font='bold 14px "Roboto Mono",monospace';
  const matched=w.text.slice(0,w.matched),remaining=w.text.slice(w.matched);
  const tw=bCtx.measureText(w.text).width,mw=bCtx.measureText(matched).width;
  const sx=w.x-tw/2;
  w.glow+=.04;if(w.opacity<1)w.opacity=Math.min(1,w.opacity+.09);
  const isT=w.matched>0,dz=Math.max(0,(w.y-bCanvas.height*.68)/(bCanvas.height*.26));
  bCtx.globalAlpha=w.opacity;
  const pad=9,h=21;
  bCtx.fillStyle=isT?'rgba(6,3,20,.94)':'rgba(6,10,20,.84)';
  bCtx.beginPath();bCtx.roundRect(sx-pad,w.y-h/2-2,tw+pad*2,h,5);bCtx.fill();
  if(isT){
    bCtx.strokeStyle=`rgba(123,47,255,${.48+.22*Math.sin(w.glow)})`;bCtx.lineWidth=1.2;
    bCtx.beginPath();bCtx.roundRect(sx-pad,w.y-h/2-2,tw+pad*2,h,5);bCtx.stroke();
  }
  if(dz>0){
    bCtx.strokeStyle=`rgba(255,45,120,${dz*.92})`;bCtx.lineWidth=1;
    bCtx.beginPath();bCtx.roundRect(sx-pad,w.y-h/2-2,tw+pad*2,h,5);bCtx.stroke();
  }
  if(matched){bCtx.shadowColor='#ff2d55';bCtx.shadowBlur=12;bCtx.fillStyle='#ff4466';bCtx.fillText(matched,sx,w.y+5);}
  bCtx.shadowColor=dz>.3?'#ff2d78':'#00e5ff';bCtx.shadowBlur=7;
  bCtx.fillStyle=dz>.3?`rgb(255,${Math.round(45+160*(1-dz))},${Math.round(120*(1-dz))})`:(isT?'#00e5ff':'#5dcfff');
  bCtx.fillText(remaining,sx+mw,w.y+5);
  bCtx.globalAlpha=1;bCtx.shadowBlur=0;
}

function bDrawShip(a){
  const x=bCanvas.width/2,y=bCanvas.height-30;
  bCtx.save();bCtx.translate(x,y);bCtx.rotate(a+Math.PI/2);
  // thruster
  const thrGrad=bCtx.createRadialGradient(0,18,0,0,18,14);
  thrGrad.addColorStop(0,'rgba(123,47,255,.7)');thrGrad.addColorStop(1,'transparent');
  bCtx.fillStyle=thrGrad;bCtx.beginPath();bCtx.ellipse(0,18,7,4,0,0,Math.PI*2);bCtx.fill();
  // hull
  bCtx.shadowColor='#00e5ff';bCtx.shadowBlur=10;
  bCtx.strokeStyle='#00e5ff';bCtx.lineWidth=1.5;bCtx.fillStyle='rgba(0,229,255,.08)';
  bCtx.beginPath();
  bCtx.moveTo(0,-22);bCtx.lineTo(-13,8);bCtx.lineTo(-6,4);bCtx.lineTo(0,12);bCtx.lineTo(6,4);bCtx.lineTo(13,8);
  bCtx.closePath();bCtx.fill();bCtx.stroke();
  // cockpit
  bCtx.fillStyle='#00e5ff';bCtx.shadowBlur=16;
  bCtx.beginPath();bCtx.arc(0,-6,2.5,0,Math.PI*2);bCtx.fill();
  bCtx.restore();
}

function bLoop(){
  if(!bRunning)return;
  bFrame=requestAnimationFrame(bLoop);
  drawBG();

  const dLine=bCanvas.height-42;
  bCtx.strokeStyle='rgba(255,45,120,.1)';bCtx.lineWidth=1;bCtx.setLineDash([4,8]);
  bCtx.beginPath();bCtx.moveTo(0,dLine);bCtx.lineTo(bCanvas.width,dLine);bCtx.stroke();bCtx.setLineDash([]);

  bSpawnT++;
  if(bSpawnT>=bSpawnI){bSpawnT=0;bSpawnI=bSI();bSpawn();if(bWords.length>2&&Math.random()<.3)bSpawn();}

  // level up check
  const newLvl=Math.min(10,Math.floor(bKilled/8)+1);
  if(newLvl>bLevel){
    bLevel=newLvl;
    bLvlFlash=60;
    const badge=document.getElementById('b-lvl-badge');
    badge.textContent='LVL '+bLevel;
    badge.style.opacity='1';
    setTimeout(()=>badge.style.opacity='0',1200);
    document.getElementById('bh-level').textContent=bLevel;
  }

  // slow-mo
  const bSpeedMult = bSlowMo>0 ? 0.15 : 1.0;
  if(bSlowMo>0) bSlowMo--;
  bWords.forEach(w=>{w.y+=w.speed*bSpeedMult;w.glow+=.04;});

  // target & ship angle
  bTarget=bWords.find(w=>w.matched>0)||null;
  const sx=bCanvas.width/2,sy=bCanvas.height-30;
  if(bTarget) bShipA=Math.atan2(bTarget.y-sy,bTarget.x-sx);
  else bShipA+=((-Math.PI/2)-bShipA)*.07;
  bDrawShip(bShipA);

  // aim line
  if(bTarget&&bInput.length>0){
    bCtx.save();bCtx.strokeStyle='#aa55ff';bCtx.lineWidth=1.8;
    bCtx.shadowColor='#7b2fff';bCtx.shadowBlur=7;
    bCtx.globalAlpha=.5+.3*Math.sin(Date.now()/60);bCtx.setLineDash([5,5]);
    bCtx.beginPath();bCtx.moveTo(sx,sy);bCtx.lineTo(bTarget.x,bTarget.y);bCtx.stroke();
    bCtx.setLineDash([]);bCtx.restore();
  }

  // kill beams
  bBeams=bBeams.filter(b=>b.life>0);
  bBeams.forEach(b=>{
    bCtx.save();bCtx.globalAlpha=b.life;
    // outer glow
    bCtx.lineWidth=8;bCtx.strokeStyle='rgba(0,229,255,0.18)';bCtx.shadowColor='#00e5ff';bCtx.shadowBlur=0;
    bCtx.beginPath();bCtx.moveTo(sx,sy);bCtx.lineTo(b.x,b.y);bCtx.stroke();
    // main beam
    bCtx.lineWidth=3;bCtx.strokeStyle='#00e5ff';bCtx.shadowColor='#00e5ff';bCtx.shadowBlur=28;
    bCtx.beginPath();bCtx.moveTo(sx,sy);bCtx.lineTo(b.x,b.y);bCtx.stroke();
    // hot core
    bCtx.lineWidth=1.2;bCtx.strokeStyle='#ffffff';bCtx.shadowColor='#ffffff';bCtx.shadowBlur=8;
    bCtx.beginPath();bCtx.moveTo(sx,sy);bCtx.lineTo(b.x,b.y);bCtx.stroke();
    bCtx.restore();b.life-=.09;
  });

  // remove fallen words
  const dead=[];
  bWords.forEach((w,i)=>{if(w.y>dLine+10)dead.push(i);});
  dead.reverse().forEach(i=>{
    bBoom(bWords[i].x,dLine,'#ff2d78');
    bWords.splice(i,1);bLives--;
    bUpdateLives();if(bLives<=0){bEnd();return;}
  });

  bWords.forEach(bDrawWord);

  // particles
  bExpl=bExpl.filter(e=>e.life>0);
  bExpl.forEach(e=>{
    bCtx.save();bCtx.globalAlpha=e.life;
    bCtx.fillStyle=e.color;bCtx.shadowColor=e.color;bCtx.shadowBlur=10;
    bCtx.beginPath();bCtx.arc(e.x,e.y,e.size,0,Math.PI*2);bCtx.fill();
    bCtx.restore();e.x+=e.vx;e.y+=e.vy;e.vy+=.12;e.life-=.04;
  });
  bPart=bPart.filter(p=>p.life>0);
  bPart.forEach(p=>{
    bCtx.save();bCtx.globalAlpha=p.life;bCtx.fillStyle='#7b2fff';bCtx.shadowColor='#7b2fff';bCtx.shadowBlur=5;
    bCtx.fillRect(p.x,p.y,p.size,p.size);bCtx.restore();p.x+=p.vx;p.y+=p.vy;p.life-=.07;
  });

  // hud update
  document.getElementById('bh-score').textContent=bScore;
  const acc=bTotal===0?'–':Math.round(bCorrect/bTotal*100)+'%';
  document.getElementById('bh-acc').textContent=acc;
  document.getElementById('b-typed').textContent=bInput;
  bHighlightNextKey();
}

function bHandleKey(key){
  if(!bRunning)return;
  if(key==='Backspace'){
    bInput=bInput.slice(0,-1);
    bWords.forEach(w=>{w.matched=bInput.length>0&&w.text.startsWith(bInput)?bInput.length:0;});
    bHighlightNextKey();return;
  }
  if(key.length!==1||!/[a-zA-Z]/.test(key))return;
  key=key.toLowerCase();bInput+=key;bTotal++;
  let hit=false;
  for(let i=0;i<bWords.length;i++){
    if(bWords[i].text===bInput){
      const w=bWords[i];
      // push effect: beam shoots, word bounces up briefly
      bBeams.push({x:w.x,y:w.y,life:1.4});bBoom(w.x,w.y);
      // add a "hit" copy that flies upward then disappears
      bExpl.push(...Array.from({length:10},()=>{
        const a=-Math.PI/2+(Math.random()-.5)*1.2, sp=3+Math.random()*4;
        return {x:w.x,y:w.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,size:3+Math.random()*4,color:'#ffffff'};
      }));
      bScore+=w.text.length*12*bLevel;bKilled++;bCorrect++;
      bSlowMo=22; // ~0.35s slow motion
      bWords.splice(i,1);bInput='';hit=true;break;
    }
  }
  if(!hit){
    let any=false;
    bWords.forEach(w=>{
      if(w.text.startsWith(bInput)){w.matched=bInput.length;any=true;bSpark(w.x,w.y+10);}
      else w.matched=0;
    });
    if(any)bCorrect++;else bInput='';
  }
  bHighlightNextKey();
}

function bUpdateLives(){
  const el=document.getElementById('bh-lives');el.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='blife'+(i>=bLives?' dead':'');el.appendChild(d);
  }
}

function bStart(){
  bScore=0;bLives=5;bLevel=1;bLevelPrev=1;bInput='';
  bWords=[];bExpl=[];bPart=[];bBeams=[];
  bKilled=0;bTotal=0;bCorrect=0;
  bSpawnT=0;bSpawnI=150;bShipA=-Math.PI/2;bSlowMo=0;
  document.getElementById('bh-level').textContent='1';
  document.getElementById('b-lvl-badge').style.opacity='0';
  bRunning=true;
  document.getElementById('b-overlay').style.display='none';
  document.getElementById('b-typed').textContent='';
  bUpdateLives();cancelAnimationFrame(bFrame);
  bResize();bLoop();
}

function bEnd(){
  bRunning=false;cancelAnimationFrame(bFrame);
  const ov=document.getElementById('b-overlay');ov.style.display='flex';
  document.getElementById('bov-title').textContent='GAME OVER';
  document.getElementById('bov-sub').textContent='المستوى '+bLevel+' — كلمات: '+bKilled;
  document.getElementById('bov-score-box').style.display='block';
  document.getElementById('bov-score').textContent='النقاط: '+bScore;
  document.getElementById('bov-btn').textContent='العب مرة أخرى';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
buildTKeyboard();
buildBKeyboard();
tRestart();
bUpdateLives();
bResize();
</script>
</body>
